name: Run Python Tests

# This triggers the workflow on every push or pull request to the main branch
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 1. Checks out your repository code so the workflow can access it
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Sets up the Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10" # You can change this to match your local Python version

    # 3. (OPTIONAL) Install SWI-Prolog
    # If your PrologInterface relies on a system-level Prolog installation (like pyswip does), 
    # uncomment the two lines below to install it on the GitHub runner.
    # - name: Install SWI-Prolog
    #   run: sudo apt-get update && sudo apt-get install -y swi-prolog

    # 4. Install Python dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        # If you have a requirements.txt, uncomment the line below:
        # pip install -r requirements.txt

    # 5. Run the tests using pytest
    - name: Run pytest
      run: |
        pytest test/