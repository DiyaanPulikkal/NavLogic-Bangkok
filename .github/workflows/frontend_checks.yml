name: Front-end Checks

on:
  push:
    branches: [main]
    paths:
      - "front-end/**"
      - ".github/workflows/frontend_checks.yml"
  pull_request:
    branches: [main]
    paths:
      - "front-end/**"
      - ".github/workflows/frontend_checks.yml"

defaults:
  run:
    working-directory: front-end

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: front-end/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check and build
        run: npm run build